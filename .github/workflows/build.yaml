name: Build

on:
  push:
    branches:
      - master

jobs:
  docker:
    runs-on: ubuntu-latest

    env:
      PLUGIN_NAME: ghcr.io/thehaven/docker-net-dhcp
      # Use platforms supported by the project
      PLATFORMS: linux/amd64,linux/arm64/v8

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run Tests
        run: make test

      - name: Run Static Analysis
        run: make verify

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install script dependencies
        run: pip3 install -r scripts/requirements.txt

      - id: vars
        name: Generate build vars
        run: |
          SHA="${{ github.sha }}"
          echo "tag=${SHA:0:8}" >> $GITHUB_OUTPUT

      - name: Build and Push
        env:
          REGISTRY_USERNAME: ${{ github.actor }}
          REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          make PLUGIN_TAG=${{ steps.vars.outputs.tag }} push-multiarch
          # Also tag as latest
          scripts/tag_multiarch_plugin.py -p "$PLATFORMS" "$PLUGIN_NAME:${{ steps.vars.outputs.tag }}" latest
